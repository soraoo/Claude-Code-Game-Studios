# Workflow Catalog
# Used by /help and /gate-check to determine phase and next steps.
#
# Artifact checks:
#   glob: file glob pattern — complete if ≥1 file matches (or min_count)
#   pattern: text pattern that must appear in the file
#   min_count: minimum matching files required (default: 1)
#   note: human-readable fallback when completion can't be auto-detected
#
# Phase gates (/gate-check): verdicts are ADVISORY — they guide but never
# hard-block advancement. The user always decides whether to proceed.

phases:

  concept:
    label: "Concept"
    description: "Define game idea, choose engine, set pillars and visual style"
    next_phase: prototype
    steps:
      - id: brainstorm
        name: "Brainstorm"
        command: /brainstorm
        required: false
        description: "Explore game concept using MDA, verb-first, and player psychology frameworks"

      - id: engine-setup
        name: "Engine Setup"
        command: /setup-engine
        required: true
        description: "Choose engine, configure version, populate engine reference docs"

      - id: game-concept
        name: "Game Concept"
        command: /quick-design
        required: true
        description: "Create the game concept document — core fantasy, pillars, scope"
        artifacts:
          - glob: "design/gdd/game-concept.md"

      - id: art-bible
        name: "Art Bible"
        command: /art-bible
        required: false
        description: "Define visual style, color palette, and asset standards"

      - id: concept-gate
        name: "Gate Check"
        command: /gate-check
        required: true
        description: "Validate readiness for prototyping"

  prototype:
    label: "Prototype"
    description: "Build and validate the core mechanic through rapid iteration"
    next_phase: production
    steps:
      - id: prototype
        name: "Prototype Core Loop"
        command: /prototype
        required: true
        description: "Build throwaway prototype to validate the fun hypothesis"
        repeatable: true

      - id: prototype-gate
        name: "Gate Check"
        command: /gate-check
        required: true
        description: "PROCEED / PIVOT / KILL decision based on prototype results"

  production:
    label: "Production"
    description: "Implement features, code review, iterate. QA is OFF — defer testing."
    next_phase: polish-release
    steps:
      - id: design-system
        name: "Design System"
        command: /design-system
        required: true
        description: "Write GDD for a game system"
        repeatable: true

      - id: create-epics
        name: "Create Epics"
        command: /create-epics
        required: false
        description: "Break GDD into implementation epics"

      - id: create-stories
        name: "Create Stories"
        command: /create-stories
        required: false
        description: "Break an epic into implementable stories"

      - id: sprint-plan
        name: "Sprint Plan"
        command: /sprint-plan
        required: false
        description: "Plan the current sprint"

      - id: dev-story
        name: "Implement Story"
        command: /dev-story
        required: true
        description: "Implement a story — the core build loop"
        repeatable: true

      - id: code-review
        name: "Code Review"
        command: /code-review
        required: false
        description: "Review code quality before merging"

      - id: story-done
        name: "Story Done"
        command: /story-done
        required: false
        description: "Verify story meets acceptance criteria"

      - id: bug-report
        name: "Bug Report"
        command: /bug-report
        required: false
        description: "Log bugs found during development"

  polish-release:
    label: "Polish & Release"
    description: "QA, bug fixes, polish, and ship. QA is ON."
    next_phase: null
    steps:
      - id: qa-plan
        name: "QA Plan"
        command: /qa-plan
        required: true
        description: "Generate test plan based on GDDs and stories"

      - id: smoke-check
        name: "Smoke Check"
        command: /smoke-check
        required: true
        description: "Critical path verification before testing"

      - id: playtest-report
        name: "Playtest Report"
        command: /playtest-report
        required: false
        description: "Collect and analyze playtest feedback"
        repeatable: true

      - id: changelog
        name: "Changelog"
        command: /changelog
        required: false
        description: "Generate changelog from git history"

      - id: release-gate
        name: "Gate Check"
        command: /gate-check
        required: true
        description: "Final release readiness check"
